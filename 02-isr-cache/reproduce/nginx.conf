# Simple load balancer to reproduce multi-instance ISR stale cache
# Run two Next.js instances:
#   SERVER_ID=instance-1 PORT=3001 node .next/standalone/server.js
#   SERVER_ID=instance-2 PORT=3002 node .next/standalone/server.js
#
# Then start nginx with this config:
#   nginx -c $(pwd)/nginx.conf

events {}

http {
  upstream nextjs {
    server 127.0.0.1:3001;
    server 127.0.0.1:3002;
  }

  server {
    listen 3000;

    location / {
      proxy_pass http://nextjs;
      proxy_set_header Host $host;
    }
  }
}
